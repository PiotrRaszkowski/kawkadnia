# Dev profile
%dev.quarkus.http.host=0.0.0.0
%dev.quarkus.http.port=8080
%dev.quarkus.datasource.db-kind=mariadb
%dev.quarkus.datasource.username=kawkadnia
%dev.quarkus.datasource.password=kawkadnia
%dev.quarkus.datasource.jdbc.url=jdbc:mariadb://localhost:3306/kawkadnia

# Production — env vars override
quarkus.datasource.db-kind=mariadb

# Hibernate
quarkus.hibernate-orm.dialect=org.hibernate.dialect.MariaDBDialect
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Liquibase
quarkus.liquibase.migrate-at-start=true

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=https://kawkadnia.pl,https://www.kawkadnia.pl
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type
quarkus.http.cors.exposed-headers=Authorization

# JWT Configuration (RSA)
mp.jwt.verify.issuer=https://kawkadnia.pl
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem

# Security — public endpoints
quarkus.http.auth.permission.public-read.paths=/api/briefings/today,/api/briefings/dates,/api/briefings/*
quarkus.http.auth.permission.public-read.methods=GET
quarkus.http.auth.permission.public-read.policy=permit

quarkus.http.auth.permission.health.paths=/q/*
quarkus.http.auth.permission.health.policy=permit

quarkus.http.auth.proactive=true
